<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Seamless PDF Editor - 100% Font & Viewport Fix</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Core PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    
    <style>
        body { 
            background-color: #0f172a; 
            color: #f8fafc;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        
        /* Fixed Viewport System - Shows Entire PDF Page properly without cutting off half */
        .workspace-scroll-container {
            width: 100%;
            height: calc(100vh - 180px);
            overflow: auto;
            display: block;
            padding: 40px 20px;
            background: #1e293b;
            box-shadow: inset 0 4px 20px rgb(0 0 0 / 0.3);
            box-sizing: border-box;
        }

        #viewer-container {
            position: relative;
            background: white;
            box-shadow: 0 25px 60px -15px rgb(0 0 0 / 0.7);
            margin: 0 auto;
            display: block;
            border-radius: 4px;
        }

        .pdf-page-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .text-layer {
            position: absolute;
            left: 0; top: 0; right: 0; bottom: 0;
            overflow: hidden;
            z-index: 20;
        }

        /* Fully Transparent Interactive Text Triggers */
        .text-layer span {
            color: transparent;
            position: absolute;
            white-space: pre;
            cursor: text;
            transform-origin: 0% 0%;
            line-height: 1;
        }

        .text-layer span:hover {
            background: rgba(59, 130, 246, 0.2);
            outline: 2px solid #3b82f6;
            border-radius: 2px;
        }

        /* Seamless Input Box matching standard typography layouts */
        .editable-input {
            position: absolute;
            border: 2px solid #3b82f6;
            outline: none;
            z-index: 50;
            padding: 0;
            margin: 0;
            font-family: inherit;
            border-radius: 2px;
            box-shadow: 0 10px 25px rgb(0 0 0 / 0.3);
        }

        /* Advanced Image Handling Overlays */
        .dropped-image {
            position: absolute;
            cursor: move;
            border: 2px dashed #10b981;
            z-index: 40;
            padding: 4px;
            background: rgba(16, 185, 129, 0.05);
            touch-action: none;
            box-sizing: border-box;
        }

        .dropped-image.locked {
            border: 2px solid transparent;
            background: transparent;
            cursor: pointer;
        }

        .dropped-image.locked:hover {
            border: 2px dashed #3b82f6;
        }

        .image-btn-container {
            position: absolute;
            top: -38px; left: 0;
            display: flex; gap: 6px;
            z-index: 45;
        }

        .img-action-btn {
            width: 28px; height: 28px;
            font-size: 14px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 6px; color: white; font-weight: bold;
            box-shadow: 0 4px 6px rgb(0 0 0 / 0.2);
        }
        .img-delete { background: #ef4444; }
        .img-confirm { background: #10b981; }

        .image-resize-handle {
            position: absolute;
            bottom: -8px; right: -8px;
            width: 16px; height: 16px;
            background: #3b82f6;
            border: 2px solid white;
            cursor: se-resize;
            z-index: 46;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgb(0 0 0 / 0.3);
        }

        #drop-zone {
            border: 2px dashed #475569;
            background: #1e293b;
            transition: all 0.2s ease;
        }
        #drop-zone.dragover {
            background: #334155;
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Top Navigation Toolbar -->
    <div class="bg-slate-900 border-b border-slate-800 p-4 shadow-xl flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <span class="text-xl font-black tracking-wider bg-gradient-to-r from-blue-400 via-indigo-400 to-teal-400 bg-clip-text text-transparent">PREMIUM PDF PRO</span>
        </div>
        
        <div class="flex items-center gap-4 flex-wrap">
            <input type="file" id="pdf-upload" accept=".pdf" class="text-sm text-slate-400 file:mr-3 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-bold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 cursor-pointer transition shadow-md"/>
            
            <!-- Dynamic File Name Input -->
            <div class="flex items-center bg-slate-950 rounded-md px-3 py-2 border border-slate-800">
                <span class="text-xs text-slate-500 mr-2 font-mono">NAME:</span>
                <input type="text" id="pdf-filename" value="premium_output" placeholder="ගොනුවේ නම" class="bg-transparent text-sm font-bold outline-none text-slate-200 w-44 border-none p-0 focus:ring-0" />
                <span class="text-xs text-slate-500 font-mono">.pdf</span>
            </div>

            <input type="file" id="image-upload" accept="image/*" class="hidden" />
            <button id="add-image-btn" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-4 py-2 rounded-md text-sm font-semibold transition border border-slate-700 disabled:opacity-40" disabled>
                📷 Add Image
            </button>

            <button id="erase-toggle-btn" class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-md text-sm font-semibold transition disabled:opacity-40" disabled>
                ✏️ Eraser: OFF
            </button>
            
            <button id="download-btn" class="bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white px-6 py-2 rounded-md text-sm font-black tracking-wide transition shadow-lg disabled:opacity-40" disabled>
                🚀 Download Premium PDF
            </button>
        </div>
    </div>

    <!-- Drag & Drop Control Center -->
    <div class="p-3 bg-slate-950/40 border-b border-slate-900">
        <div id="drop-zone" class="p-3 text-center rounded-xl text-xs font-semibold text-slate-400 flex items-center justify-center cursor-pointer shadow-inner">
            📥 Drop Images Here to Insert / පින්තූර මෙතැනට ඇද දමන්න (Or Click to Select)
        </div>
    </div>

    <!-- Core Interactive Studio Canvas -->
    <div class="flex-1 w-full flex justify-center items-start">
        <div id="editor-workspace" class="w-full flex justify-center">
            <div id="placeholder" class="text-center mt-20 p-12 border-2 border-dashed border-slate-800 bg-slate-900/50 rounded-3xl max-w-sm w-full shadow-2xl">
                <div class="text-4xl mb-4">📄</div>
                <p class="text-slate-400 text-sm font-bold tracking-wide">කරුණාකර සංස්කරණය සඳහා PDF එකක් තෝරන්න</p>
            </div>
            
            <!-- Fixed Layout Wrapper preventing 50% cutoff -->
            <div id="scroll-box" class="workspace-scroll-container hidden">
                <div id="viewer-container">
                    <div class="pdf-page-wrapper" id="page-wrapper">
                        <canvas id="pdf-canvas" style="position: relative; z-index: 10; display: block;"></canvas>
                        <div id="text-layer" class="text-layer"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let originalBytes = null;
        let pdfScale = 1.5; // High resolution rendering scale for pixel perfection
        let originalPageWidth = 0;
        let originalPageHeight = 0;

        let textEdits = {}; 
        let imageEdits = []; 
        let eraseDrawings = []; 
        let isEraseModeActive = false; 
        let isDrawing = false;
        let currentStroke = null;

        const pdfUpload = document.getElementById('pdf-upload');
        const pdfFilenameInput = document.getElementById('pdf-filename');
        const imageUpload = document.getElementById('image-upload');
        const addImageBtn = document.getElementById('add-image-btn');
        const eraseToggleBtn = document.getElementById('erase-toggle-btn');
        const downloadBtn = document.getElementById('download-btn');
        const placeholder = document.getElementById('placeholder');
        const scrollBox = document.getElementById('scroll-box');
        const viewerContainer = document.getElementById('viewer-container');
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const textLayerDiv = document.getElementById('text-layer');
        const pageWrapper = document.getElementById('page-wrapper');
        const dropZone = document.getElementById('drop-zone');

        pdfUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const nameWithoutExt = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            pdfFilenameInput.value = nameWithoutExt + "_premium";

            const reader = new FileReader();
            reader.onload = async function() {
                originalBytes = new Uint8Array(this.result);
                textEdits = {}; imageEdits = []; eraseDrawings = [];
                isEraseModeActive = false;
                eraseToggleBtn.innerText = "✏️ Eraser: OFF";
                textLayerDiv.style.zIndex = '20';
                
                document.querySelectorAll('.dropped-image, .editable-input').forEach(el => el.remove());
                
                await renderPdfPage();
                downloadBtn.disabled = false;
                addImageBtn.disabled = false;
                eraseToggleBtn.disabled = false;
                placeholder.classList.add('hidden');
                scrollBox.classList.remove('hidden');
            };
            reader.readAsArrayBuffer(file);
        });

        eraseToggleBtn.addEventListener('click', () => {
            isEraseModeActive = !isEraseModeActive;
            if (isEraseModeActive) {
                eraseToggleBtn.innerText = "✏️ Eraser: ON";
                textLayerDiv.style.zIndex = '5';
            } else {
                eraseToggleBtn.innerText = "✏️ Eraser: OFF";
                textLayerDiv.style.zIndex = '20';
            }
        });

        async function renderPdfPage() {
            const loadingTask = pdfjsLib.getDocument({data: originalBytes});
            const pdfDoc = await loadingTask.promise;
            const page = await pdfDoc.getPage(1); 

            const viewport = page.getViewport({ scale: pdfScale });
            originalPageWidth = page.getViewport({ scale: 1.0 }).width;
            originalPageHeight = page.getViewport({ scale: 1.0 }).height;

            canvas.width = viewport.width;
            canvas.height = viewport.height;
            viewerContainer.style.width = viewport.width + 'px';
            viewerContainer.style.height = viewport.height + 'px';

            const renderContext = { canvasContext: ctx, viewport: viewport };
            await page.render(renderContext).promise;

            textLayerDiv.innerHTML = '';
            setupCanvasEraser(); 

            // Font Vector Trace Logic Integration
            const textContent = await page.getTextContent();
            let idx = 0;
            textContent.items.forEach((item) => {
                if (!item.str.trim()) return;
                idx++;

                const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
                const span = document.createElement('span');
                span.id = 'span_' + idx;
                span.innerText = item.str;
                
                const computedTop = tx[5] - (item.height * pdfScale);
                
                span.style.left = `${tx[4]}px`;
                span.style.top = `${computedTop}px`; 
                span.style.fontSize = `${item.height * pdfScale}px`;
                span.style.width = `${item.width * pdfScale}px`;
                span.style.height = `${item.height * pdfScale}px`;
                
                // Track Font Specifications natively
                span.style.fontFamily = 'inherit';
                const isFontBold = item.fontName.toLowerCase().includes('bold') || item.fontName.toLowerCase().includes('black');

                span.addEventListener('click', (e) => {
                    if (isEraseModeActive) return;
                    e.stopPropagation();
                    
                    const bgPixel = ctx.getImageData(tx[4] + 1, computedTop + 1, 1, 1).data;
                    const bgRGB = `rgb(${bgPixel[0]}, ${bgPixel[1]}, ${bgPixel[2]})`;

                    let textR = 0, textG = 0, textB = 0;
                    let maxDist = -1;
                    const startX = Math.floor(tx[4] + (item.width * pdfScale) * 0.2);
                    const endX = Math.floor(tx[4] + (item.width * pdfScale) * 0.8);
                    const startY = Math.floor(computedTop + (item.height * pdfScale) * 0.2);
                    const endY = Math.floor(computedTop + (item.height * pdfScale) * 0.8);

                    for (let x = startX; x < endX; x += Math.max(1, Math.floor((endX - startX) / 5))) {
                        for (let y = startY; y < endY; y += Math.max(1, Math.floor((endY - startY) / 5))) {
                            const p = ctx.getImageData(x, y, 1, 1).data;
                            const dist = Math.abs(p[0] - bgPixel[0]) + Math.abs(p[1] - bgPixel[1]) + Math.abs(p[2] - bgPixel[2]);
                            if (dist > maxDist) {
                                maxDist = dist;
                                textR = p[0]; textG = p[1]; textB = p[2];
                            }
                        }
                    }

                    if (maxDist < 40) {
                        const brightness = (bgPixel[0] * 299 + bgPixel[1] * 587 + bgPixel[2] * 114) / 1000;
                        textR = textG = textB = brightness > 128 ? 0 : 255;
                    }

                    const textRGB = `rgb(${textR}, ${textG}, ${textB})`;
                    const currentActiveText = textEdits[span.id] ? textEdits[span.id].rawInput : item.str;

                    createSeamlessInputBox(span, item, tx[4], computedTop, bgRGB, bgPixel, textRGB, textR, textG, textB, isFontBold, currentActiveText);
                });

                textLayerDiv.appendChild(span);
            });
        }

        function createSeamlessInputBox(span, item, leftPos, topPos, bgRGB, bgPixel, textRGB, textR, textG, textB, isFontBold, currentActiveText) {
            span.style.visibility = 'hidden';

            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'editable-input';
            input.value = currentActiveText;
            
            input.style.left = `${leftPos}px`;
            input.style.top = `${topPos}px`;
            input.style.fontSize = `${item.height * pdfScale}px`;
            input.style.width = `${(item.width * pdfScale) + 100}px`;
            input.style.height = `${item.height * pdfScale * 1.2}px`;
            input.style.backgroundColor = bgRGB;
            input.style.color = textRGB;
            if (isFontBold) input.style.fontWeight = 'bold';

            pageWrapper.appendChild(input);
            input.focus();
            input.select();

            const saveEdits = () => {
                let userValue = input.value;
                
                textEdits[span.id] = {
                    x: leftPos / pdfScale,
                    y: originalPageHeight - (topPos / pdfScale) - item.height, 
                    newText: userValue,
                    rawInput: userValue,
                    fontSize: item.height,
                    originalWidth: (item.width * pdfScale) / pdfScale,
                    originalHeight: item.height,
                    isBold: isFontBold,
                    bgColor: { r: bgPixel[0]/255, g: bgPixel[1]/255, b: bgPixel[2]/255 },
                    textColor: { r: textR/255, g: textG/255, b: textB/255 }
                };
                
                // Solid Fill Background Erasure Masking
                ctx.fillStyle = bgRGB;
                ctx.fillRect(leftPos - 2, topPos - 2, (item.width * pdfScale) + 105, item.height * pdfScale * 1.3);
                
                // Trace on browser preview using exact canvas specifications
                ctx.fillStyle = textRGB;
                ctx.font = `${isFontBold ? 'bold ' : ''}${item.height * pdfScale}px sans-serif`;
                ctx.fillText(userValue, leftPos, topPos + (item.height * pdfScale * 0.85));
                
                input.remove();
            };

            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveEdits(); });
            input.addEventListener('blur', saveEdits);
        }

        function setupCanvasEraser() {
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const startDrawing = (e) => {
                if (!isEraseModeActive) return;
                isDrawing = true;
                const pos = getPos(e);
                const pixel = ctx.getImageData(pos.x, pos.y, 1, 1).data;
                const colorRGB = `rgb(${pixel[0]}, ${pixel[1]}, ${pixel[2]})`;

                currentStroke = {
                    color: { r: pixel[0]/255, g: pixel[1]/255, b: pixel[2]/255 },
                    points: [{ x: pos.x / pdfScale, y: originalPageHeight - (pos.y / pdfScale) }]
                };

                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                ctx.lineWidth = 14; 
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ctx.strokeStyle = colorRGB;
            };

            const draw = (e) => {
                if (!isDrawing || !isEraseModeActive) return;
                const pos = getPos(e);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                currentStroke.points.push({ x: pos.x / pdfScale, y: originalPageHeight - (pos.y / pdfScale) });
            };

            const stopDrawing = () => {
                if (isDrawing && currentStroke) { eraseDrawings.push(currentStroke); }
                isDrawing = false; currentStroke = null;
            };

            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            window.addEventListener('mouseup', stopDrawing);
        }

        // Image Management (Drag, Drop, Resize Fixed)
        dropZone.addEventListener('click', () => imageUpload.click());
        addImageBtn.addEventListener('click', () => imageUpload.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) processImage(e.dataTransfer.files[0]);
        });
        imageUpload.addEventListener('change', (e) => {
            if (e.target.files.length > 0) processImage(e.target.files[0]);
        });

        function processImage(file) {
            if (!file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (event) => renderImageOnCanvas(event.target.result);
            reader.readAsDataURL(file);
        }

        function renderImageOnCanvas(base64Src) {
            const imgId = 'img_' + Date.now();
            const wrapper = document.createElement('div');
            wrapper.className = 'dropped-image';
            wrapper.id = imgId;
            wrapper.style.left = '80px';
            wrapper.style.top = '80px';
            wrapper.style.width = '140px'; 
            wrapper.style.height = '140px';

            const img = document.createElement('img');
            img.src = base64Src;
            img.style.width = '100%'; img.style.height = '100%'; img.style.objectFit = 'contain';
            img.style.pointerEvents = 'none';
            wrapper.appendChild(img);

            const btnContainer = document.createElement('div');
            btnContainer.className = 'image-btn-container';

            const deleteBtn = document.createElement('div');
            deleteBtn.className = 'img-action-btn img-delete'; deleteBtn.innerText = '×';
            deleteBtn.onclick = (e) => { e.stopPropagation(); wrapper.remove(); imageEdits = imageEdits.filter(i => i.id !== imgId); };

            const confirmBtn = document.createElement('div');
            confirmBtn.className = 'img-action-btn img-confirm'; confirmBtn.innerText = '✓';
            
            btnContainer.appendChild(confirmBtn); btnContainer.appendChild(deleteBtn);
            wrapper.appendChild(btnContainer);

            const resizeHandle = document.createElement('div');
            resizeHandle.className = 'image-resize-handle';
            wrapper.appendChild(resizeHandle);
            
            pageWrapper.appendChild(wrapper);

            let imageTrackingObj = {
                id: imgId,
                x: 80 / pdfScale,
                y: originalPageHeight - ((80 + 140) / pdfScale),
                w: 140 / pdfScale,
                h: 140 / pdfScale,
                src: base64Src
            };
            imageEdits.push(imageTrackingObj);

            confirmBtn.onclick = (e) => {
                e.stopPropagation();
                wrapper.classList.add('locked');
                btnContainer.style.display = 'none'; resizeHandle.style.display = 'none';
            };

            wrapper.onclick = (e) => {
                if (wrapper.classList.contains('locked')) {
                    e.stopPropagation();
                    wrapper.classList.remove('locked');
                    btnContainer.style.display = 'flex'; resizeHandle.style.display = 'block';
                }
            };

            setupImageInteractions(wrapper, resizeHandle, (updatedLeft, updatedTop, updatedWidth, updatedHeight) => {
                imageTrackingObj.x = updatedLeft / pdfScale;
                imageTrackingObj.y = originalPageHeight - ((updatedTop + updatedHeight) / pdfScale);
                imageTrackingObj.w = updatedWidth / pdfScale;
                imageTrackingObj.h = updatedHeight / pdfScale;
            });
        }

        function setupImageInteractions(element, handle, onUpdate) {
            element.addEventListener('mousedown', (e) => {
                if (element.classList.contains('locked') || e.target === handle || e.target.classList.contains('img-action-btn')) return;
                e.preventDefault();
                let startX = e.clientX, startY = e.clientY;
                
                const onMouseMove = (ev) => {
                    let dx = ev.clientX - startX; let dy = ev.clientY - startY;
                    let nextLeft = element.offsetLeft + dx; let nextTop = element.offsetTop + dy;
                    element.style.left = nextLeft + 'px'; element.style.top = nextTop + 'px';
                    startX = ev.clientX; startY = ev.clientY;
                    onUpdate(nextLeft, nextTop, element.offsetWidth, element.offsetHeight);
                };
                const onMouseUp = () => { document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); };
                document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp);
            });

            handle.addEventListener('mousedown', (e) => {
                e.stopPropagation(); e.preventDefault();
                let startX = e.clientX, startY = e.clientY;
                let startW = element.offsetWidth, startH = element.offsetHeight;

                const onMouseMoveResize = (ev) => {
                    let currentWidth = startW + (ev.clientX - startX);
                    let currentHeight = startH + (ev.clientY - startY);
                    if (currentWidth > 30 && currentHeight > 30) {
                        element.style.width = currentWidth + 'px';
                        element.style.height = currentHeight + 'px';
                        onUpdate(element.offsetLeft, element.offsetTop, currentWidth, currentHeight);
                    }
                };
                const onMouseUpResize = () => { document.removeEventListener('mousemove', onMouseMoveResize); document.removeEventListener('mouseup', onMouseUpResize); };
                document.addEventListener('mousemove', onMouseMoveResize); document.addEventListener('mouseup', onMouseUpResize);
            });
        }

        function base64ToArrayBuffer(base64Url) {
            const base64Str = base64Url.split(',')[1];
            const binaryStr = window.atob(base64Str);
            const uint8Array = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) { uint8Array[i] = binaryStr.charCodeAt(i); }
            return uint8Array.buffer;
        }

        // Compilation engine mapping fonts directly on the compiled data stream
        downloadBtn.addEventListener('click', async () => {
            if (!originalBytes) return;
            try {
                const { PDFDocument, rgb, StandardFonts } = PDFLib;
                const pdfDocInstance = await PDFDocument.load(originalBytes);
                const firstPage = pdfDocInstance.getPages()[0];
                
                // Embedded Vector Grade Typography Map
                const helveticaFont = await pdfDocInstance.embedFont(StandardFonts.Helvetica);
                const helveticaBoldFont = await pdfDocInstance.embedFont(StandardFonts.HelveticaBold);

                // 1. Process Erasures
                eraseDrawings.forEach(stroke => {
                    for (let i = 0; i < stroke.points.length - 1; i++) {
                        firstPage.drawLine({
                            start: { x: stroke.points[i].x, y: stroke.points[i].y },
                            end: { x: stroke.points[i+1].x, y: stroke.points[i+1].y },
                            thickness: 14,
                            color: rgb(stroke.color.r, stroke.color.g, stroke.color.b),
                        });
                    }
                });

                // 2. High-Fidelity Font Replication Output
                Object.values(textEdits).forEach(edit => {
                    firstPage.drawRectangle({
                        x: edit.x - 1, y: edit.y - 1,
                        width: edit.originalWidth * 1.5, height: edit.originalHeight * 1.35,
                        color: rgb(edit.bgColor.r, edit.bgColor.g, edit.bgColor.b),
                    });
                    if(edit.newText.trim().length > 0) {
                        firstPage.drawText(edit.newText, {
                            x: edit.x, y: edit.y + (edit.fontSize * 0.05),
                            size: edit.fontSize,
                            font: edit.isBold ? helveticaBoldFont : helveticaFont,
                            color: rgb(edit.textColor.r, edit.textColor.g, edit.textColor.b),
                        });
                    }
                });

                // 3. Process Images
                for (const imgEdit of imageEdits) {
                    const buffer = base64ToArrayBuffer(imgEdit.src);
                    const embeddedImage = imgEdit.src.includes('image/png') ? 
                        await pdfDocInstance.embedPng(buffer) : await pdfDocInstance.embedJpg(buffer);

                    firstPage.drawImage(embeddedImage, {
                        x: imgEdit.x, y: imgEdit.y,
                        width: imgEdit.w, height: imgEdit.h
                    });
                }

                const finalPdfBytes = await pdfDocInstance.save();
                const blob = new Blob([finalPdfBytes], { type: "application/pdf" });
                
                let filename = pdfFilenameInput.value.trim();
                if(!filename) filename = "premium_edited_document";
                if(!filename.endsWith(".pdf")) filename += ".pdf";

                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                link.click();
            } catch (err) {
                alert("PDF ගොනුව සකස් කිරීමේදී දෝෂයක් ඇතිවිය.");
            }
        });
    </script>
</body>
</html>
