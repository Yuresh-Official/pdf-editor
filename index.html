<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Studio Pro - Final Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    
    <style>
        body { background-color: #0f172a; color: #f8fafc; margin: 0; padding: 0; font-family: sans-serif; }
        .workspace-scroll { height: 75vh; overflow: auto; display: flex; justify-content: center; padding: 20px; }
        #viewer-container { position: relative; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #pdf-canvas { display: block; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col items-center">

    <div class="bg-slate-900 w-full p-4 flex flex-wrap gap-2 justify-center shadow-md">
        <input type="file" id="pdf-upload" accept=".pdf" class="bg-slate-700 p-2 rounded text-xs">
        <button id="download-btn" class="bg-emerald-600 px-4 py-2 rounded text-xs font-bold text-white shadow-lg" disabled>🚀 Share / Download</button>
    </div>

    <div id="scroll-box" class="workspace-scroll hidden">
        <div id="viewer-container">
            <canvas id="pdf-canvas"></canvas>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        let originalBytes = null;
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');

        // PDF Upload
        document.getElementById('pdf-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function() {
                originalBytes = new Uint8Array(this.result);
                await renderPdf();
                document.getElementById('download-btn').disabled = false;
                document.getElementById('scroll-box').classList.remove('hidden');
            };
            reader.readAsArrayBuffer(file);
        });

        // Render PDF
        async function renderPdf() {
            const pdfDoc = await pdfjsLib.getDocument({data: originalBytes}).promise;
            const page = await pdfDoc.getPage(1);
            const viewport = page.getViewport({ scale: 1.5 });
            
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            
            const renderContext = { canvasContext: ctx, viewport: viewport };
            await page.render(renderContext).promise;
        }

        // Share & Download Logic
        document.getElementById('download-btn').addEventListener('click', async () => {
            if (!originalBytes) return;
            
            // PDF-Lib මගින් edit කිරීම
            const pdfDoc = await PDFLib.PDFDocument.load(originalBytes);
            const finalBytes = await pdfDoc.save();
            const blob = new Blob([finalBytes], { type: "application/pdf" });
            const file = new File([blob], "my_cv.pdf", { type: "application/pdf" });

            // Share API එක භාවිතා කිරීම
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({
                    files: [file],
                    title: 'My CV',
                    text: 'සංස්කරණය කරන ලද CV එක.'
                }).catch(() => downloadDirectly(blob));
            } else {
                downloadDirectly(blob);
            }
        });

        function downloadDirectly(blob) {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "my_cv.pdf";
            link.click();
        }
    </script>
</body>
</html>
